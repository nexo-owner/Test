<html lang="en"><head>
  <title>Play Tung Sahur Clicker Online!</title>
  <meta charset="utf-8">
  <meta name="robots" content="noindex, nofollow, noodp, noydir">
  <meta name="viewport" content="width=device-width, maximum-scale=1.0, initial-scale=1.0, user-scalable=no, minimal-ui">
  <meta http-equiv="X-UA-Compatible" content="requiresActiveX=true,IE=Edge,chrome=1">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Tung Sahur Clicker">
  <meta http-equiv="Content-Language" content="en-US">
  <meta property="og:type" content="game">
  <meta http-equiv="Content-Security-Policy" content="upgrade-insecure-requests">
  <style type="text/css">
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Helvetica, Arial, Roboto, sans-serif;
    }

    html, body {
      width: 100%;
      height: 100%;
      background: #000;
    }

    :root {
      --tw-text-opacity: 1;
      --rounded-btn: 15px;
      --fallback-bc: #1f2937;
      --bc: 19.7021% 0 0;
      --b2: 91.6146% 0 0;
      --fallback-p: rgba(255, 115, 0, 0.86);
      --fallback-s: rgba(98, 0, 226, 0.86);
      --tw-ring-offset-shadow: 0 0 #0000;
      --tw-ring-shadow: 0 0 #0000;
      --p: 71.9% .357 330.759573;
      --s: 73.37% .224 48.250878;
    }

    .game-container {
      position: relative;
      height: 100%;
    }

    .img-bg {
      display: block;
      vertical-align: middle;
      max-width: 100%;
      width: 100%;
      height: 100%;
      position: absolute;
      inset: 0;
      object-fit: cover;
      filter: blur(10px);
    }

    .facade-content {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: opacity .3s ease-out;
      background: #000000bf;
    }

    .facade-content-center {
      z-index: 10;
      padding: 0 15px;
      text-align: center;
    }

    .game-title {
      margin-bottom: 15px;
      font-size: 30px;
      line-height: 48px;
      font-weight: 700;
      color: rgb(255 255 255 / var(--tw-text-opacity, 1));
      text-transform: capitalize;
    }

    @media (min-width: 1024px) {
      .game-title {
        font-size: 64px;
        line-height: 1;
      }
    }

.game-img {
    display: block;
    margin: 0 auto 15px;
    max-width: 100%;
    height: 200px;
    border-radius: 10px;
}

.game-btn {
    display: inline-flex
;
    align-items: center;
    justify-content: center;
    flex-wrap: wrap;
    border-color: oklch(0.5 0.2 25.69);
    text-align: center;
    line-height: 18px;
    gap: .5rem;
    font-weight: 600;
    background-color: oklch(0.74 0.18 68.94);
    height: 56px;
    min-height: 56px;
    padding: 0 32px;
    font-size: 16px;
    position: relative;
    animation: pulse-scale 2s ease-in-out infinite;
    border-radius: 9999px;
    border-width: 0;
    background-image: linear-gradient(to right, var(--tw-gradient-stops));
    --tw-gradient-from: var(--fallback-p) var(--tw-gradient-from-position);
    --tw-gradient-stops: var(--tw-gradient-from), var(--tw-gradient-to);
    --tw-gradient-to: var(--fallback-s) var(--tw-gradient-to-position);
    color: #ffffff;
    --tw-shadow-color: var(--fallback-p);
    --tw-shadow-colored: 0 10px 15px -3px var(--tw-shadow-color), 0 4px 6px -4px var(--tw-shadow-color);
    box-shadow: var(--tw-ring-offset-shadow), var(--tw-ring-shadow), var(--tw-shadow-colored);
    transition: all 0.3s cubic-bezier(.4, 0, .2, 1);
    cursor: pointer;
    user-select: none;
}

    .game-btn:before,
    .game-btn:after {
      content: "";
      position: absolute;
      inset: -4px;
      border-radius: 9999px;
      background: linear-gradient(45deg, var(--p), var(--s));
      opacity: 0;
      transition: opacity .3s ease;
      z-index: -1;
    }

    .game-btn:after {
      filter: blur(12px);
    }

    .game-btn:hover {
      --tw-gradient-to: var(--fallback-s);
      color: rgb(255 255 255 / var(--tw-text-opacity));
      box-shadow: var(--tw-ring-offset-shadow), var(--tw-ring-shadow), 0 20px 25px -5px rgb(0 0 0 / .1), 0 8px 10px -6px rgb(0 0 0 / .1);
      --tw-shadow-color: var(--fallback-p);
    }

    .game-btn-flex {
      display: flex;
      align-items: center;
      gap: .5rem;
    }

    .game-btn-flex-svg {
      width: 1.5rem;
      height: 1.5rem;
    }

    @keyframes pulse-scale {
      0%, 100% {
        transform: scale(1);
      }
      50% {
        transform: scale(1.05);
      }
    }

    @media (min-width: 640px) {
      .game-title {
        font-size: 48px;
      }

      .game-btn {
        height: 64px;
        min-height: 64px;
        padding: 0 48px;
        font-size: 18px;
      }
    }

    .loading_wrap {
      position: absolute;
      inset: 0;
      z-index: 20;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .backdrop-blur-sm {
      position: absolute;
      inset: 0;
      background-color: #000c;
      backdrop-filter: blur(4px);
    }

    .loading_box {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .loading-spinner {
      display: inline-block;
      width: 128px;
      height: 128px;
      background-color: currentColor;
      mask-image: url("data:image/svg+xml,%3Csvg width='24' height='24' stroke='black' viewBox='0 0 24 24' xmlns='http://www.w3.org/2000/svg'%3E%3Cg transform-origin='center'%3E%3Ccircle cx='12' cy='12' r='9.5' fill='none' stroke-width='3' stroke-linecap='round'%3E%3CanimateTransform attributeName='transform' type='rotate' from='0 12 12' to='360 12 12' dur='2s' repeatCount='indefinite'/%3E%3Canimate attributeName='stroke-dasharray' values='0,150;42,150;42,150' keyTimes='0;0.475;1' dur='1.5s' repeatCount='indefinite'/%3E%3Canimate attributeName='stroke-dashoffset' values='0;-16;-59' keyTimes='0;0.475;1' dur='1.5s' repeatCount='indefinite'/%3E%3C/circle%3E%3C/g%3E%3C/svg%3E");
      mask-repeat: no-repeat;
      mask-position: center;
      mask-size: 100%;
      color: var(--fallback-p);
    }

    .loading_text {
      margin-top: 24px;
      font-size: 20px;
      line-height: 28px;
      font-weight: 500;
      color: #ffffffe6;
    }

    .hidden {
      display: none;
    }

    body.hide_footer {
      height: calc(100% + 41px) !important;
      overflow: hidden !important;
    }
  </style>
</head>
<body>
  <div id="preloading-game">
    
    
    
  </div>

  <script>
    let game_type = "IN_GAME";
    let url_game = "https://game.azgame.io/tung-sahur-clicker/";
    let check_load_now = "";
    let check_referrer = "";

    document.addEventListener('DOMContentLoaded', function () {
      if ((game_type !== 'EXTERNAL' && check_load_now) || game_type === 'IFRAME_HTML') {
        loading_game(false);
      }
    });

    function loading_game(check) {
      if (check && document.getElementById('infor_box')) {
        document.getElementById('infor_box').remove();
      }
      if (document.getElementById('loading_wrap')) {
        document.getElementById('loading_wrap').classList.remove('hidden');
      }

      start_game_frame();

      setTimeout(() => {
        if (document.getElementById('background_img')) {
          document.getElementById('background_img').remove();
        }
        if (document.getElementById('loading_wrap')) {
          document.getElementById('loading_wrap').remove();
        }
      }, 1240);
    }

    function start_game_frame() {
      let frame_game = document.createElement('iframe');
      frame_game.setAttribute('id', 'iframehtml5');
      frame_game.setAttribute('width', '100%');
      frame_game.setAttribute('height', '100%');
      frame_game.setAttribute('frameborder', '0');
      frame_game.setAttribute('scrolling', 'auto');
      frame_game.setAttribute('class', 'iframe-default');
      frame_game.setAttribute('allowfullscreen', 'true');
      frame_game.setAttribute('src', url_game);
      frame_game.setAttribute('title', "Tung Sahur Clicker");
      frame_game.setAttribute('sandbox', 'allow-forms allow-modals allow-same-origin allow-scripts allow-pointer-lock');
      if (check_referrer) {
        frame_game.setAttribute('referrerPolicy', 'no-referrer');
      }
      document.body.append(frame_game);

      if (game_type === 'HIDE_FOOTER') {
        document.querySelector('body').className = "hide_footer";
      }
    }
  </script>
